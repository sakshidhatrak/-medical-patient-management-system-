name: medical_patient_management
description: Neurosurgery OPD & Surgery Management System
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.4

  # Navigation
  go_router: ^13.2.1

  # Backend
  supabase_flutter: ^2.8.4

  # Networking
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1

  # Local Database (offline)
  sqflite: ^2.3.2
  path: ^1.9.0
  path_provider: ^2.1.2

  # Secure Storage
  flutter_secure_storage: ^9.0.0

  # Shared Preferences
  shared_preferences: ^2.2.2

  # Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Image handling
  image_picker: ^1.0.7
  flutter_image_compress: ^2.3.0
  cached_network_image: ^3.3.1

  # File handling
  file_picker: ^8.1.2

  # PDF generation and printing
  pdf: ^3.11.0
  printing: ^5.13.0

  # Share / WhatsApp
  share_plus: ^10.1.4

  # Utilities
  equatable: ^2.0.5
  dartz: ^0.10.1
  connectivity_plus: ^6.0.3
  intl: ^0.19.0
  uuid: ^4.3.3
  collection: ^1.18.0

  # Fonts
  google_fonts: ^8.1.0

  # UI helpers
  flutter_slidable: ^3.1.0
  shimmer: ^3.0.0
  timeago: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  sqflite_common_ffi: ^2.3.4+4
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.11
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
